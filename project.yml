name: DailyLogs
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 11.0.0
options:
  bundleIdPrefix: com.flyfishyu
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_BUNDLE_IDENTIFIER: com.flyfishyu.DailyLogs
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: 用于显示你所在地区的日出日落时间。
    INFOPLIST_KEY_NSCameraUsageDescription: 用于为餐食记录拍照。
    INFOPLIST_KEY_NSPhotoLibraryUsageDescription: 用于从相册选择餐食照片。
    INFOPLIST_KEY_NSPhotoLibraryAddUsageDescription: 用于保存你拍摄的餐食照片。
targets:
  DailyLogs:
    type: application
    platform: iOS
    sources:
      - path: DailyLogs
    resources:
      - path: DailyLogs/Resources/Assets.xcassets
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
    settings:
      base:
        PRODUCT_NAME: DailyLogs
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: NO
        CODE_SIGN_ENTITLEMENTS: DailyLogs/Resources/DailyLogs.entitlements
    scheme:
      testTargets:
        - DailyLogsTests
  DailyLogsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DailyLogsTests
    dependencies:
      - target: DailyLogs
