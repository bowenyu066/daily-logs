name: DailyLogs
packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk.git
    from: 11.0.0
options:
  bundleIdPrefix: com.flyfishyu
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 6.0
    PRODUCT_BUNDLE_IDENTIFIER: com.flyfishyu.DailyLogs
    CURRENT_PROJECT_VERSION: 2
    MARKETING_VERSION: 1.0
    GENERATE_INFOPLIST_FILE: NO
targets:
  DailyLogs:
    type: application
    platform: iOS
    sources:
      - path: DailyLogs
    resources:
      - path: DailyLogs/Resources/Assets.xcassets
      - path: DailyLogs/Resources/GoogleService-Info.plist
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseStorage
    settings:
      base:
        PRODUCT_NAME: DailyLogs
        DEVELOPMENT_TEAM: FMKLLHVL75
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MACCATALYST: NO
        INFOPLIST_FILE: DailyLogs/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: DailyLogs/Resources/DailyLogs.entitlements
    scheme:
      testTargets:
        - DailyLogsTests
  DailyLogsTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DailyLogsTests
    dependencies:
      - target: DailyLogs
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
